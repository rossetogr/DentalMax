services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: odonto_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql://root:root_password@db/odonto_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: